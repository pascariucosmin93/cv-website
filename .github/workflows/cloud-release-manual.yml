name: Manual Cloud Release

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing tested .cloud tag to promote, for example 0.0.12"
        required: true
        type: string
      release_version:
        description: "Manual release version to publish after approval, for example 1.0.0"
        required: true
        type: string
      update_gitops:
        description: "Also update the .cloud / on-prem cv-gitops deployment to this release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  GITOPS_REPO: https://github.com/pascariucosmin93/cv-gitops.git

jobs:
  promote:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must match x.y.z"
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/cv-website" >> "$GITHUB_OUTPUT"

      - name: Promote image tags
        env:
          IMAGE: ${{ steps.img.outputs.image }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail

          MAJOR="${RELEASE_VERSION%%.*}"
          MINOR="${RELEASE_VERSION%.*}"

          docker pull "$IMAGE:$SOURCE_TAG"
          docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$RELEASE_VERSION"
          docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$MAJOR"
          docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$MINOR"
          docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:latest"

          docker push "$IMAGE:$RELEASE_VERSION"
          docker push "$IMAGE:$MAJOR"
          docker push "$IMAGE:$MINOR"
          docker push "$IMAGE:latest"

      - name: Update cloud cv-gitops to promoted version
        if: ${{ inputs.update_gitops }}
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          GITOPS_PUSH_USER: ${{ secrets.GITOPS_PUSH_USER }}
          GITOPS_PUSH_TOKEN: ${{ secrets.GITOPS_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_PUSH_USER:-}" ] || [ -z "${GITOPS_PUSH_TOKEN:-}" ]; then
            echo "GITOPS_PUSH_USER / GITOPS_PUSH_TOKEN not set."
            exit 1
          fi

          AUTH_REPO=$(echo "$GITOPS_REPO" | sed "s#https://#https://${GITOPS_PUSH_USER}:${GITOPS_PUSH_TOKEN}@#")
          WORKDIR=$(mktemp -d)

          git clone "$AUTH_REPO" "$WORKDIR/gitops"
          cd "$WORKDIR/gitops"

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("apps/cv-website/kustomization.yaml")
          data = path.read_text()
          version = os.environ["RELEASE_VERSION"]
          data = re.sub(r'(newTag:\s*")[^"]+(")', rf'\g<1>{version}\g<2>', data, count=1)
          path.write_text(data)
          PY

          if git diff --quiet -- apps/cv-website/kustomization.yaml; then
            echo "cv-gitops cloud deployment already on ${RELEASE_VERSION}"
            exit 0
          fi

          git config user.name "CV Website CI Bot"
          git config user.email "cv-website-ci-bot@users.noreply.github.com"
          git add apps/cv-website/kustomization.yaml
          git commit -m "chore(gitops): promote cv-website cloud ${RELEASE_VERSION}"
          git push origin main
