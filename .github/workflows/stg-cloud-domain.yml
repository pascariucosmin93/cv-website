name: STG .cloud Domain Deploy

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "Dockerfile"
      - ".dockerignore"
      - "nginx.conf"
      - "docker-entrypoint.sh"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cv-website-build-${{ github.ref }}
  cancel-in-progress: false

env:
  GITOPS_REPO: https://github.com/pascariucosmin93/cv-gitops.git

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate static site files
        run: |
          set -euo pipefail
          test -f index.html
          test -f css/style.css
          test -f js/main.js
          grep -q "<!DOCTYPE html>" index.html
          grep -q "<title>" index.html

  build-scan-smoke-push:
    needs:
      - validate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version metadata
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::6}" >> "$GITHUB_OUTPUT"
          echo "dev_version=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/cv-website" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -t "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.short_sha }}" \
            -t "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.dev_version }}" \
            .

      - name: Scan image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 \
            image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.dev_version }}"

      - name: Smoke test container
        run: |
          set -euo pipefail

          cleanup() {
            local exit_code=$?
            if [ "$exit_code" -ne 0 ]; then
              docker logs cv-website-smoke || true
            fi
            docker rm -f cv-website-smoke >/dev/null 2>&1 || true
            exit "$exit_code"
          }
          trap cleanup EXIT

          docker run -d --name cv-website-smoke -p 8080:80 \
            "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.dev_version }}"

          for _ in $(seq 1 30); do
            if curl --silent --show-error --fail \
                 -H "Host: cosmin-lab.cloud" \
                 http://127.0.0.1:8080/ | grep -q "Cosmin Pascariu"; then
              exit 0
            fi
            sleep 2
          done

          exit 1

      - name: Push image tags
        run: |
          docker push "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.short_sha }}"
          docker push "${{ steps.img.outputs.image }}:${{ steps.vars.outputs.dev_version }}"

      - name: Update cv-gitops image tag for cloud
        env:
          DEV_VERSION: ${{ steps.vars.outputs.dev_version }}
          GITOPS_PUSH_USER: ${{ secrets.GITOPS_PUSH_USER }}
          GITOPS_PUSH_TOKEN: ${{ secrets.GITOPS_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_PUSH_USER:-}" ] || [ -z "${GITOPS_PUSH_TOKEN:-}" ]; then
            echo "GITOPS_PUSH_USER / GITOPS_PUSH_TOKEN not set."
            exit 1
          fi

          AUTH_REPO=$(echo "$GITOPS_REPO" | sed "s#https://#https://${GITOPS_PUSH_USER}:${GITOPS_PUSH_TOKEN}@#")
          WORKDIR=$(mktemp -d)

          git clone "$AUTH_REPO" "$WORKDIR/gitops"
          cd "$WORKDIR/gitops"

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("apps/cv-website/kustomization.yaml")
          data = path.read_text()
          version = os.environ["DEV_VERSION"]
          data = re.sub(r'(newTag:\s*")[^"]+(")', rf'\g<1>{version}\g<2>', data, count=1)
          path.write_text(data)
          PY

          if git diff --quiet -- apps/cv-website/kustomization.yaml; then
            echo "cv-gitops cloud deployment already up to date"
            exit 0
          fi

          git config user.name "CV Website CI Bot"
          git config user.email "cv-website-ci-bot@users.noreply.github.com"
          git add apps/cv-website/kustomization.yaml
          git commit -m "chore(gitops): deploy cv-website cloud ${DEV_VERSION}"
          git push origin main
