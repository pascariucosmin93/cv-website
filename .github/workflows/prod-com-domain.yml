name: PROD .com Domain Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Type deploy-prod-com to confirm the manual Azure deployment"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cv-website-prod-com-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Require explicit confirmation
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          set -euo pipefail
          test "$CONFIRM_PRODUCTION" = "deploy-prod-com"

      - name: Validate static site files
        run: |
          set -euo pipefail
          test -f index.html
          test -f css/style.css
          test -f js/main.js
          grep -q "<!DOCTYPE html>" index.html
          grep -q "<title>" index.html

      - name: Create Azure deployment package
        run: |
          set -euo pipefail
          mkdir -p azure-package/css azure-package/js
          cp index.html azure-package/
          cp -R css/. azure-package/css/
          cp -R js/. azure-package/js/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-com-azure-package
          path: azure-package

  deploy:
    needs:
      - validate
    runs-on: ubuntu-latest
    environment:
      name: production-com

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-com-azure-package
          path: azure-package

      - name: Deploy static files to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_COSMIN_LAB_COM }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_COSMIN_LAB_COM }}
          package: azure-package
