name: PROD .com Static Web App Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: "Type deploy-prod-com to confirm the manual Azure deployment"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cv-website-prod-com-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Require explicit confirmation
        env:
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production }}
        run: |
          set -euo pipefail
          test "$CONFIRM_PRODUCTION" = "deploy-prod-com"

      - name: Validate static site files
        run: |
          set -euo pipefail
          test -f index.html
          test -f css/style.css
          test -f js/main.js
          grep -q "<!DOCTYPE html>" index.html
          grep -q "<title>" index.html

      - name: Deploy static files to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_COSMIN_LAB_COM }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: /
          output_location: /
