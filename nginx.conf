user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_cf_connecting_ip $real_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    map $real_ip $ddos_blocked {
        default 0;
        include /etc/nginx/ddos/blocked_ips.map;
    }

    map $http_user_agent $loggable {
        ~*kube-probe  0;
        ~*Go-http-client  0;
        default       1;
    }

    log_format json_cf escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$real_ip",'
        '"cf_ip":"$http_cf_connecting_ip",'
        '"country":"$http_cf_ipcountry",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"ua":"$http_user_agent"}';

    access_log /dev/stdout json_cf if=$loggable;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        if ($ddos_blocked) {
            return 403;
        }

        location / {
            try_files $uri $uri/ /index.html =404;
            add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
