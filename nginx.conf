user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Resolve real client IP from Cloudflare header
    map $http_cf_connecting_ip $real_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    # Dynamic DDoS blocklist (synced every 15s by docker-entrypoint.sh)
    map $real_ip $ddos_blocked {
        default 0;
        include /etc/nginx/ddos/blocked_ips.map;
    }

    # Suppress k8s health-probe noise from access log
    map $http_user_agent $loggable {
        ~*kube-probe      0;
        ~*Go-http-client  0;
        default           1;
    }

    # Rate-limit zone: 100 req/min per real IP, 10 MB shared memory
    limit_req_zone $real_ip zone=per_ip:10m rate=100r/m;
    limit_req_status 429;

    # Structured JSON log — $host added for multi-domain visibility
    log_format json_cf escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$real_ip",'
        '"cf_ip":"$http_cf_connecting_ip",'
        '"country":"$http_cf_ipcountry",'
        '"host":"$host",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"ua":"$http_user_agent"}';

    access_log /dev/stdout json_cf if=$loggable;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1M;
    server_tokens   off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json
               application/javascript application/xml+rss application/rss+xml
               font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # ── DEFAULT SERVER: block all unknown hosts (direct IP, scanners, etc.) ──
    # /health is still served so kube-probe and Docker HEALTHCHECK pass.
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 403;
        }
    }

    # ── MAIN SERVER: accepted domains only ───────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name cosmin-lab.com     www.cosmin-lab.com
                    cosmin-lab.cloud   www.cosmin-lab.cloud;

        root  /usr/share/nginx/html;
        index index.html index.htm;

        # Rate limiting: 100 req/min, burst of 20 without queue delay
        limit_req zone=per_ip burst=20 nodelay;

        # Block DDoS-listed IPs
        if ($ddos_blocked) {
            return 403;
        }

        # ── Block sensitive file extensions ──────────────────────────────────
        # Covers database dumps, config files, scripts, credentials, env files
        location ~* \.(sql|sqlite|bak|backup|env|yml|yaml|conf|log|sh|bash|py|rb|php|ini|cfg|json)$ {
            return 403;
        }

        # ── Block common scanner / exploit probe paths ────────────────────────
        location ~* /(\.git|\.svn|wp-admin|wp-login|phpmyadmin|shell|eval|\.env|aws|config|db\.sql|backup\.sql) {
            return 403;
        }

        # ── Block all dotfiles / hidden paths ─────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Kubernetes health probe (exact match, no log) ─────────────────────
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Static assets: immutable long-lived cache ─────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        # ── Main location: serve real files only, no SPA fallback ────────────
        location / {
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, max-age=3600";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        }
    }
}
